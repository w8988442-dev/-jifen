<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中奖积分管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans SC',sans-serif;background:#0F1117;color:#E2E8F0;min-height:100vh}
  button{cursor:pointer;font-family:'Noto Sans SC',sans-serif}
  input{font-family:'Noto Sans SC',sans-serif}
  .header{background:linear-gradient(135deg,#1A1F2E,#16213E);border-bottom:1px solid #1E293B;padding:0 16px}
  .header-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
  .logo-title{font-weight:900;font-size:14px;letter-spacing:.5px}
  .logo-sub{font-size:10px;color:#6B7280;letter-spacing:1px}
  .tabs{display:flex;gap:3px}
  .tab{padding:7px 12px;border-radius:7px;border:none;font-size:12px;font-weight:500;transition:all .2s;background:transparent;color:#9CA3AF}
  .tab.active{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff}
  .content{max-width:700px;margin:0 auto;padding:16px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat-card{border-radius:12px;padding:14px 16px}
  .stat-icon{font-size:22px;margin-bottom:6px}
  .stat-value{font-size:22px;font-weight:900}
  .stat-label{font-size:11px;color:#6B7280;margin-top:3px}
  .card{background:#161B27;border:1px solid #1E293B;border-radius:12px;padding:16px;margin-bottom:14px}
  .card-title{font-weight:700;font-size:14px;margin-bottom:12px}
  .prize-grid{display:flex;gap:8px;flex-wrap:wrap}
  .prize-badge{background:#0F1117;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px}
  .prize-name{font-weight:700;font-size:13px}
  .prize-pts{font-size:11px;color:#9CA3AF}
  .search-row{display:flex;gap:10px;margin-bottom:14px}
  .search-input{flex:1;background:#161B27;border:1px solid #1E293B;border-radius:9px;padding:10px 14px;color:#E2E8F0;font-size:13px;outline:none}
  .btn-add{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;white-space:nowrap}
  .customer-card{background:#161B27;border:1px solid #1E293B;border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .customer-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .customer-name{font-weight:700;font-size:14px}
  .customer-phone{font-size:11px;color:#6B7280}
  .level-badge{font-size:10px;border-radius:5px;padding:2px 7px;display:inline-block;margin-top:3px}
  .customer-points{font-weight:900;font-size:20px;color:#6366F1;margin-left:auto;text-align:right}
  .pts-label{font-size:10px;color:#6B7280}
  .customer-btns{display:flex;gap:6px;flex-wrap:wrap}
  .btn-sm{border:none;border-radius:7px;padding:6px 10px;font-size:11px;font-weight:500}
  .btn-record{background:#1E293B;color:#94A3B8}
  .btn-prize{background:#1B1F3A;color:#818CF8;border:1px solid #3730A3!important}
  .btn-redeem{background:#0A2818;color:#34D399;border:1px solid #064E3B!important}
  .btn-delete{background:#1F1010;color:#F87171;border:1px solid #7F1D1D!important}
  .rewards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .reward-card{background:#161B27;border:1px solid #1E293B;border-radius:12px;padding:16px;text-align:center;position:relative}
  .reward-icon{font-size:34px;margin-bottom:8px}
  .reward-name{font-weight:700;font-size:13px;margin-bottom:4px}
  .reward-pts{color:#6366F1;font-weight:900;font-size:18px}
  .reward-stock{font-size:11px;color:#6B7280;margin-top:3px}
  .reward-actions{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
  .modal{background:#161B27;border:1px solid #1E293B;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
  .modal-title{font-weight:700;font-size:15px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .modal-close{background:none;border:none;color:#6B7280;font-size:22px;line-height:1}
  .form-label{font-size:12px;color:#9CA3AF;display:block;margin-bottom:5px}
  .form-input{width:100%;background:#0F1117;border:1px solid #1E293B;border-radius:7px;padding:10px 12px;color:#E2E8F0;font-size:13px;outline:none;margin-bottom:12px}
  .btn-row{display:flex;gap:8px;margin-top:8px}
  .btn-primary{flex:1;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600}
  .btn-secondary{flex:1;background:#1E293B;color:#9CA3AF;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600}
  .btn-green{background:linear-gradient(135deg,#059669,#10B981)!important}
  .prize-option{border-radius:9px;padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .15s;border:1px solid #1E293B;background:#0F1117}
  .prize-option-name{font-weight:600;font-size:13px}
  .prize-option-pts{font-weight:700;color:#6366F1;margin-left:auto;font-size:14px}
  .history-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1E293B}
  .history-prize{font-weight:600;font-size:13px}
  .history-date{font-size:11px;color:#6B7280}
  .history-pts{font-weight:700;font-size:15px;margin-left:auto}
  .notif{position:fixed;top:16px;right:16px;z-index:9999;padding:11px 16px;border-radius:9px;font-weight:500;font-size:13px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .notif.success{background:#064E3B;border:1px solid #10B981;color:#6EE7B7}
  .notif.error{background:#7F1D1D;border:1px solid #EF4444;color:#FCA5A5}
  .rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1E293B}
  .rank-num{width:24px;font-weight:900;text-align:center;font-size:14px}
  .rank-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
  .rank-name{font-weight:600;font-size:13px}
  .rank-level{font-size:11px}
  .rank-pts{font-weight:700;color:#6366F1;font-size:16px;margin-left:auto}
  .current-pts{font-size:12px;color:#9CA3AF;margin-bottom:12px}
  .empty{color:#6B7280;text-align:center;padding:20px;font-size:13px}
  .redeem-option{border-radius:9px;padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .15s;border:1px solid #1E293B;background:#0F1117}
  .redeem-option.selected{border-color:#10B981;background:#0A2818}
  .redeem-option.disabled{opacity:.35;cursor:not-allowed}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🎰</div>
      <div>
        <div class="logo-title">中奖积分管理系统</div>
        <div class="logo-sub">LUCKY POINTS MANAGER</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('dashboard')">📊 概览</button>
      <button class="tab" onclick="switchTab('customers')">👥 客户</button>
      <button class="tab" onclick="switchTab('rewards')">🎁 奖品</button>
    </div>
  </div>
</div>

<div class="content">
  <div id="tab-dashboard">
    <div class="stats">
      <div class="stat-card" style="background:#1E1B4B;border:1px solid #6366F122">
        <div class="stat-icon">👥</div>
        <div class="stat-value" style="color:#6366F1" id="stat-customers">0</div>
        <div class="stat-label">总客户数</div>
      </div>
      <div class="stat-card" style="background:#1C1917;border:1px solid #F59E0B22">
        <div class="stat-icon">⚡</div>
        <div class="stat-value" style="color:#F59E0B" id="stat-points">0</div>
        <div class="stat-label">累计发放积分</div>
      </div>
      <div class="stat-card" style="background:#022C22;border:1px solid #10B98122">
        <div class="stat-icon">🎯</div>
        <div class="stat-value" style="color:#10B981" id="stat-wins">0</div>
        <div class="stat-label">累计中奖次数</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🏆 奖项积分对照表</div>
      <div class="prize-grid" id="prize-ref"></div>
    </div>
    <div class="card">
      <div class="card-title">🌟 积分排行榜</div>
      <div id="leaderboard"></div>
    </div>
  </div>

  <div id="tab-customers" style="display:none">
    <div class="search-row">
      <input class="search-input" placeholder="搜索姓名或手机号..." oninput="renderCustomers(this.value)" />
      <button class="btn-add" onclick="openModal('add')">+ 新增客户</button>
    </div>
    <div id="customer-list"></div>
  </div>

  <div id="tab-rewards" style="display:none">
    <div class="section-header">
      <div style="font-weight:700;font-size:14px">🎁 可兑换奖品列表</div>
      <button class="btn-add" onclick="openAddReward()">+ 新增奖品</button>
    </div>
    <div class="rewards-grid" id="rewards-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">

  <div class="modal" id="modal-add" style="display:none">
    <div class="modal-title">➕ 新增客户 <button class="modal-close" onclick="closeModal()">×</button></div>
    <label class="form-label">客户姓名</label>
    <input class="form-input" id="input-name" placeholder="请输入姓名" />
    <label class="form-label">手机号码</label>
    <input class="form-input" id="input-phone" placeholder="请输入手机号" />
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="addCustomer()">确认添加</button>
    </div>
  </div>

  <div class="modal" id="modal-prize" style="display:none">
    <div class="modal-title">🎯 记录中奖 <button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="current-pts" id="prize-customer-info"></div>
    <div id="prize-options"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="btn-confirm-prize" onclick="confirmPrize()" style="opacity:.4;pointer-events:none">确认记录</button>
    </div>
  </div>

  <div class="modal" id="modal-redeem" style="display:none">
    <div class="modal-title">🎁 兑换奖品 <button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="current-pts" id="redeem-customer-info"></div>
    <div id="redeem-options"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary btn-green" id="btn-confirm-redeem" onclick="confirmRedeem()" style="opacity:.4;pointer-events:none">确认兑换</button>
    </div>
  </div>

  <div class="modal" id="modal-history" style="display:none">
    <div class="modal-title">📋 积分记录 <button class="modal-close" onclick="closeModal()">×</button></div>
    <div id="history-list"></div>
  </div>

  <div class="modal" id="modal-reward-edit" style="display:none">
    <div class="modal-title" id="reward-modal-title">➕ 新增奖品 <button class="modal-close" onclick="closeModal()">×</button></div>
    <label class="form-label">图标（emoji，如 🎁）</label>
    <input class="form-input" id="reward-icon" placeholder="🎁" />
    <label class="form-label">奖品名称</label>
    <input class="form-input" id="reward-name" placeholder="请输入奖品名称" />
    <label class="form-label">所需积分</label>
    <input class="form-input" id="reward-points" type="number" placeholder="例如 200" />
    <label class="form-label">库存数量</label>
    <input class="form-input" id="reward-stock" type="number" placeholder="例如 10" />
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveReward()">保存</button>
    </div>
  </div>

</div>

<div id="notif" class="notif" style="display:none"></div>

<script>
const PRIZES=[
  {label:"一等奖",points:500,color:"#FFD700",emoji:"🥇"},
  {label:"二等奖",points:200,color:"#C0C0C0",emoji:"🥈"},
  {label:"三等奖",points:100,color:"#CD7F32",emoji:"🥉"},
  {label:"幸运奖",points:50,color:"#4FC3F7",emoji:"🍀"},
  {label:"参与奖",points:10,color:"#A5D6A7",emoji:"⭐"},
];

let customers=JSON.parse(localStorage.getItem('customers')||'null')||[
  {id:1,name:"张小明",phone:"138****8888",points:650,history:[{date:"2026-05-10",prize:"二等奖",pts:200},{date:"2026-05-15",prize:"一等奖",pts:500},{date:"2026-05-16",prize:"兑换: 精美礼品袋",pts:-200}]},
  {id:2,name:"李华",phone:"139****6666",points:310,history:[{date:"2026-05-12",prize:"三等奖",pts:100},{date:"2026-05-14",prize:"幸运奖",pts:50}]},
  {id:3,name:"王芳",phone:"150****5555",points:60,history:[{date:"2026-05-16",prize:"参与奖",pts:10},{date:"2026-05-18",prize:"幸运奖",pts:50}]},
];

let rewards=JSON.parse(localStorage.getItem('rewards')||'null')||[
  {id:1,name:"优惠券 ¥10",points:100,icon:"🎫",stock:50},
  {id:2,name:"精美礼品袋",points:200,icon:"🎁",stock:30},
  {id:3,name:"免费午餐",points:350,icon:"🍱",stock:20},
  {id:4,name:"SPA体验券",points:500,icon:"💆",stock:10},
  {id:5,name:"豪华礼品套装",points:800,icon:"👑",stock:5},
  {id:6,name:"旅游大礼包",points:1500,icon:"✈️",stock:2},
];

let currentModal=null,selectedPrize=null,selectedReward=null,targetCustomerId=null,editingRewardId=null;

function save(){
  localStorage.setItem('customers',JSON.stringify(customers));
  localStorage.setItem('rewards',JSON.stringify(rewards));
}

function getLevel(pts){
  if(pts>=1000)return{label:"钻石会员",color:"#60A5FA",icon:"💎"};
  if(pts>=500)return{label:"黄金会员",color:"#FBBF24",icon:"🥇"};
  if(pts>=200)return{label:"白银会员",color:"#9CA3AF",icon:"🥈"};
  return{label:"普通会员",color:"#6EE7B7",icon:"⭐"};
}

function showNotif(msg,type='success'){
  const el=document.getElementById('notif');
  el.textContent=msg;
  el.className='notif '+(type==='error'?'error':'success');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

function switchTab(t){
  ['dashboard','customers','rewards'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'':'none';
  });
  document.querySelectorAll('.tab').forEach((btn,i)=>{
    btn.className='tab'+(['dashboard','customers','rewards'][i]===t?' active':'');
  });
  if(t==='dashboard')renderDashboard();
  if(t==='customers')renderCustomers('');
  if(t==='rewards')renderRewards();
}

function renderDashboard(){
  document.getElementById('stat-customers').textContent=customers.length;
  document.getElementById('stat-points').textContent=customers.reduce((s,c)=>s+c.points,0).toLocaleString();
  document.getElementById('stat-wins').textContent=customers.reduce((s,c)=>s+c.history.filter(h=>h.pts>0).length,0);
  document.getElementById('prize-ref').innerHTML=PRIZES.map(p=>`
    <div class="prize-badge" style="border:1px solid ${p.color}44">
      <span style="font-size:18px">${p.emoji}</span>
      <div><div class="prize-name" style="color:${p.color}">${p.label}</div><div class="prize-pts">+${p.points} 积分</div></div>
    </div>`).join('');
  const sorted=[...customers].sort((a,b)=>b.points-a.points).slice(0,5);
  document.getElementById('leaderboard').innerHTML=sorted.length?sorted.map((c,i)=>{
    const lvl=getLevel(c.points);
    const rc=i===0?'#FBBF24':i===1?'#9CA3AF':i===2?'#CD7F32':'#374151';
    return`<div class="rank-item">
      <div class="rank-num" style="color:${rc}">${i+1}</div>
      <div class="rank-avatar" style="background:${lvl.color}22;border:1px solid ${lvl.color}44">${lvl.icon}</div>
      <div><div class="rank-name">${c.name}</div><div class="rank-level" style="color:${lvl.color}">${lvl.label}</div></div>
      <div class="rank-pts">${c.points.toLocaleString()} <span style="font-size:10px;color:#6B7280">积分</span></div>
    </div>`;
  }).join(''):'<div class="empty">暂无客户</div>';
}

function renderCustomers(q){
  const list=customers.filter(c=>c.name.includes(q)||c.phone.includes(q));
  document.getElementById('customer-list').innerHTML=list.length?list.map(c=>{
    const lvl=getLevel(c.points);
    return`<div class="customer-card">
      <div class="customer-top">
        <div class="avatar" style="background:${lvl.color}22;border:2px solid ${lvl.color}44">${lvl.icon}</div>
        <div>
          <div class="customer-name">${c.name}</div>
          <div class="customer-phone">${c.phone}</div>
          <span class="level-badge" style="color:${lvl.color};background:${lvl.color}11;border:1px solid ${lvl.color}33">${lvl.label}</span>
        </div>
        <div class="customer-points">${c.points.toLocaleString()}<div class="pts-label">积分</div></div>
      </div>
      <div class="customer-btns">
        <button class="btn-sm btn-record" onclick="openHistory(${c.id})">📋 记录</button>
        <button class="btn-sm btn-prize" onclick="openPrize(${c.id})">🎯 中奖</button>
        <button class="btn-sm btn-redeem" onclick="openRedeem(${c.id})">🎁 兑换</button>
        <button class="btn-sm btn-delete" onclick="deleteCustomer(${c.id},'${c.name}')">🗑️ 删除</button>
      </div>
    </div>`;
  }).join(''):'<div class="empty">没有找到客户</div>';
}

function renderRewards(){
  document.getElementById('rewards-grid').innerHTML=rewards.map(r=>`
    <div class="reward-card">
      <div class="reward-icon">${r.icon}</div>
      <div class="reward-name">${r.name}</div>
      <div class="reward-pts">${r.points} <span style="font-size:11px;font-weight:400;color:#6B7280">积分</span></div>
      <div class="reward-stock">库存 ${r.stock} 件</div>
      <div class="reward-actions">
        <button class="btn-sm btn-record" onclick="openEditReward(${r.id})">✏️ 编辑</button>
        <button class="btn-sm btn-delete" onclick="deleteReward(${r.id},'${r.name}')">🗑️ 删除</button>
      </div>
    </div>`).join('');
}

function openModal(type){
  document.getElementById('modal-overlay').style.display='flex';
  ['add','prize','redeem','history','reward-edit'].forEach(t=>{
    document.getElementById('modal-'+t).style.display=t===type?'block':'none';
  });
  currentModal=type;
}

function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
  selectedPrize=null;selectedReward=null;targetCustomerId=null;editingRewardId=null;
  document.getElementById('btn-confirm-prize').style.opacity='.4';
  document.getElementById('btn-confirm-prize').style.pointerEvents='none';
  document.getElementById('btn-confirm-redeem').style.opacity='.4';
  document.getElementById('btn-confirm-redeem').style.pointerEvents='none';
}

function closeModalOverlay(e){if(e.target.id==='modal-overlay')closeModal();}

function addCustomer(){
  const name=document.getElementById('input-name').value.trim();
  const phone=document.getElementById('input-phone').value.trim();
  if(!name||!phone)return;
  customers.push({id:Date.now(),name,phone,points:0,history:[]});
  save();
  document.getElementById('input-name').value='';
  document.getElementById('input-phone').value='';
  closeModal();
  renderCustomers('');
  renderDashboard();
  showNotif(`客户 ${name} 添加成功！`);
}

function deleteCustomer(id,name){
  if(!confirm(`确定要删除客户「${name}」吗？`))return;
  customers=customers.filter(c=>c.id!==id);
  save();renderCustomers('');renderDashboard();
  showNotif(`已删除客户 ${name}`);
}

function openPrize(id){
  targetCustomerId=id;
  const c=customers.find(x=>x.id===id);
  document.getElementById('prize-customer-info').textContent=`${c.name} 当前积分：${c.points}`;
  document.getElementById('prize-options').innerHTML=PRIZES.map(p=>`
    <div class="prize-option" id="po-${p.label}" style="color:${p.color}" onclick="selectPrize('${p.label}')">
      <span style="font-size:20px">${p.emoji}</span>
      <div class="prize-option-name">${p.label}</div>
      <div class="prize-option-pts">+${p.points} 积分</div>
    </div>`).join('');
  openModal('prize');
}

function selectPrize(label){
  selectedPrize=PRIZES.find(p=>p.label===label);
  document.querySelectorAll('.prize-option').forEach(el=>el.style.background='#0F1117');
  document.getElementById('po-'+label).style.background=selectedPrize.color+'18';
  document.getElementById('btn-confirm-prize').style.opacity='1';
  document.getElementById('btn-confirm-prize').style.pointerEvents='auto';
}

function confirmPrize(){
  if(!selectedPrize||!targetCustomerId)return;
  const today=new Date().toISOString().slice(0,10);
  const c=customers.find(x=>x.id===targetCustomerId);
  c.points+=selectedPrize.points;
  c.history.unshift({date:today,prize:selectedPrize.label,pts:selectedPrize.points});
  save();closeModal();renderCustomers('');renderDashboard();
  showNotif(`🎉 已为 ${c.name} 记录 ${selectedPrize.label}，+${selectedPrize.points} 积分！`);
}

function openRedeem(id){
  targetCustomerId=id;
  const c=customers.find(x=>x.id===id);
  document.getElementById('redeem-customer-info').textContent=`${c.name} 当前积分：${c.points}`;
  document.getElementById('redeem-options').innerHTML=rewards.map(r=>{
    const can=c.points>=r.points;
    return`<div class="redeem-option${can?'':' disabled'}" id="ro-${r.id}" onclick="selectReward(${r.id},${can})">
      <span style="font-size:20px">${r.icon}</span>
      <div style="flex:1"><div style="font-weight:600;font-size:13px">${r.name}</div><div style="font-size:11px;color:#6B7280">库存 ${r.stock}</div></div>
      <div style="font-weight:700;color:${can?'#10B981':'#4B5563'};font-size:14px">${r.points} 积分</div>
    </div>`;
  }).join('');
  openModal('redeem');
}

function selectReward(id,can){
  if(!can)return;
  selectedReward=rewards.find(r=>r.id===id);
  document.querySelectorAll('.redeem-option').forEach(el=>el.classList.remove('selected'));
  document.getElementById('ro-'+id).classList.add('selected');
  document.getElementById('btn-confirm-redeem').style.opacity='1';
  document.getElementById('btn-confirm-redeem').style.pointerEvents='auto';
}

function confirmRedeem(){
  if(!selectedReward||!targetCustomerId)return;
  const c=customers.find(x=>x.id===targetCustomerId);
  if(c.points<selectedReward.points){showNotif('积分不足！','error');return;}
  const today=new Date().toISOString().slice(0,10);
  c.points-=selectedReward.points;
  c.history.unshift({date:today,prize:`兑换: ${selectedReward.name}`,pts:-selectedReward.points});
  save();closeModal();renderCustomers('');renderDashboard();
  showNotif(`✅ ${c.name} 成功兑换 ${selectedReward.name}！`);
}

function openHistory(id){
  const c=customers.find(x=>x.id===id);
  document.querySelector('#modal-history .modal-title').childNodes[0].textContent=`📋 ${c.name} 的积分记录 `;
  document.getElementById('history-list').innerHTML=c.history.length?c.history.map(h=>`
    <div class="history-item">
      <span style="font-size:18px">${h.pts>0?'🎯':'🎁'}</span>
      <div><div class="history-prize">${h.prize}</div><div class="history-date">${h.date}</div></div>
      <div class="history-pts" style="color:${h.pts>0?'#34D399':'#F87171'}">${h.pts>0?'+':''}${h.pts}</div>
    </div>`).join(''):'<div class="empty">暂无记录</div>';
  openModal('history');
}

function openAddReward(){
  editingRewardId=null;
  document.getElementById('reward-modal-title').childNodes[0].textContent='➕ 新增奖品 ';
  document.getElementById('reward-icon').value='';
  document.getElementById('reward-name').value='';
  document.getElementById('reward-points').value='';
  document.getElementById('reward-stock').value='';
  openModal('reward-edit');
}

function openEditReward(id){
  const r=rewards.find(x=>x.id===id);
  editingRewardId=id;
  document.getElementById('reward-modal-title').childNodes[0].textContent='✏️ 编辑奖品 ';
  document.getElementById('reward-icon').value=r.icon;
  document.getElementById('reward-name').value=r.name;
  document.getElementById('reward-points').value=r.points;
  document.getElementById('reward-stock').value=r.stock;
  openModal('reward-edit');
}

function saveReward(){
  const icon=document.getElementById('reward-icon').value.trim()||'🎁';
  const name=document.getElementById('reward-name').value.trim();
  const points=parseInt(document.getElementById('reward-points').value)||0;
  const stock=parseInt(document.getElementById('reward-stock').value)||0;
  if(!name){showNotif('请输入奖品名称','error');return;}
  if(editingRewardId){
    const r=rewards.find(x=>x.id===editingRewardId);
    r.icon=icon;r.name=name;r.points=points;r.stock=stock;
    showNotif(`奖品「${name}」已更新！`);
  } else {
    rewards.push({id:Date.now(),icon,name,points,stock});
    showNotif(`奖品「${name}」添加成功！`);
  }
  save();closeModal();renderRewards();
}

function deleteReward(id,name){
  if(!confirm(`确定要删除奖品「${name}」吗？`))return;
  rewards=rewards.filter(r=>r.id!==id);
  save();renderRewards();
  showNotif(`已删除奖品 ${name}`);
}

renderDashboard();
renderRewards();
</script>
</body>
</html>
